<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Metrô SP</title>
<link rel="stylesheet" href="css/style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0053A0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Metrô SP">

</head>

<body>

    <section id="header">
        <div class="navbar">
            <div class="title">
                <h1>Olá! Qual será o destino de hoje?</h1>
            </div>
            <div class="notification">
                <img src="assets/icons/bell.png" alt="">
            </div>
        </div>
    </section>

    <section id="infos">
        <div class="service-title">
            <p>Serviços</p>
        </div>
        
        <div class="main-services">
            <div>
                <p class="title">Definir rota</p>
                <p class="description">Crie uma rota e veja o tempo do percurso para o seu destino</p>
                <a href="pages/routes.html"><button>Definir Rota</button></a>
            </div>
            <div class="card-mapa">
                <p class="title">Mapa</p>
                <p class="description">Escolha entre visualizar a malha completa do metrô ou explorar o desenho individual das linhas</p>
                <a href="pages/lines.html"><button>Abrir mapa</button></a>
            </div>
        </div>

        <div class="grid-services">
            <div>
                <img src="assets/icons/globe.png" alt="">
                <p>Sites oficiais</p>
            </div>
                <a href="pages/lines.html" class="grid-service-link">
                    <img src="assets/icons/lines.png" alt="">
                    <p>Linhas</p>
                </a>
            <div>
                <img src="assets/icons/connect.png" alt="">
                <p>Conecta</p>
            </div>
            <div>
                <img src="assets/icons/info.png" alt="">
                <p>Informações</p>
            </div>
            <div>
                <a href="pages/contacts.html" class="grid-service-link">
                    <img src="assets/icons/contact.png" alt="">
                    <p>Contatos</p>
                </a>
            </div>
            <div>
                <a href="pages/status.html" class="grid-service-link">
                    <img src="assets/icons/status.png" alt="">
                    <p>Status</p>
                </a>
            </div>
        </div>

    </section>

<script type="module" src="js/app.js"></script>

</body>
</html>
