<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
    <title>Mobilidade SP</title>

    <script>
    (function () {
        const isMobile = /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|WPDesktop/i.test(navigator.userAgent);
        const isSmallScreen = window.innerWidth <= 768;

        if (!isMobile && !isSmallScreen && !window.location.pathname.includes("desktop-block")) {
            window.location.href = "desktop-block.html";
        }
    })();
    </script>

<link rel="stylesheet" href="../css/style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0053A0">
</head>

<body>

    <section id="header">
        <div class="navbar">
            <div class="title">
                <a href="../index.html" class="back-link" aria-label="Voltar"><span class="back-icon">&lt;</span></a>
                <h1>Linhas e estacoes</h1>
            </div>
        </div>
    </section>

    <section id="tela-linhas">
        <div class="linhas-intro">
            <h2>Veja as linhas do sistema</h2>
            <p>Escolha uma linha para abrir os detalhes e visualizar as estacoes em ordem.</p>
        </div>

        <div id="lista-linhas" class="lista-linhas"></div>
    </section>

    <script type="module" src="../js/lines.js"></script>

</body>
</html>
