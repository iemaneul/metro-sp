<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
    <title>Mobilidade SP</title>

    <script>
    (function () {
        const isMobile = /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|WPDesktop/i.test(navigator.userAgent);
        const isSmallScreen = window.innerWidth <= 768;

        if (!isMobile && !isSmallScreen && !window.location.pathname.includes("desktop-block")) {
            window.location.href = "desktop-block.html";
        }
    })();
    </script>

<link rel="stylesheet" href="../css/style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0053A0">
</head>

<body>

    <section id="header">
        <div class="navbar">
            <div class="title">
                <a href="../index.html" class="back-link" aria-label="Voltar"><span class="back-icon">&lt;</span></a>
                <h1>Informações</h1>
            </div>
        </div>
    </section>

    <section id="tela-linhas">
        <div class="linhas-intro">
            <h2>Informações</h2>
            <p>Confira todas as informações adicionais que você precisa saber sobre o sistema de transporte metropolitano.</p>
        </div>

        <div id="lista-linhas" class="lista-linhas">
            <a class="linha-card" href="schedules.html">
                <div class="linha-card-topo">
                    <div class="linha-card-principal">
                        <h3><i class="fi fi-sr-alarm-clock"></i>Horários de funcionamento</h3>
                    </div>
                    <div class="d-flex fd-row ai-center gap-10">
                        <span class="arrow-detail">&gt;</span>
                    </div>
                </div>
            </a>

            <a class="linha-card" href="ticket.html">
                <div class="linha-card-topo">
                    <div class="linha-card-principal">
                        <h3><i class="fi fi-sr-ticket-alt"></i>Tarifas e bilhete único</h3>
                    </div>
                    <div class="d-flex fd-row ai-center gap-10">
                        <span class="arrow-detail">&gt;</span>
                    </div>
                </div>
            </a>
        </div>
    </section>

</body>
</html>
