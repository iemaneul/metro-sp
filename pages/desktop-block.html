<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Acesse pelo celular</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, #0053A0 0%, #003B73 100%);
            color: #fff;
        }

        .container {
            background: #fff;
            color: #222;
            border-radius: 20px;
            padding: 30px 24px;
            width: 90%;
            max-width: 800px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 22px;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
            line-height: 20px;
        }

        .qr-box {
            background: #f5f5f5;
            padding: 16px;
            border-radius: 12px;
            margin: 20px 0;
        }

        .qr-box img {
            width: 180px;
        }

        .divider {
            font-size: 12px;
            color: #aaa;
            margin: 10px 0;
        }

        .link {
            font-size: 13px;
            word-break: break-all;
            color: #0053A0;
            font-weight: 500;
        }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="icon">📱</div>

        <h1>Acesse pelo celular</h1>

        <p class="subtitle">
            Este app foi projetado para dispositivos móveis, ainda estamos trabalhando para adaptar a versão desktop.
            Para melhor experiência, abra no seu smartphone.
        </p>

        <div class="qr-box">
            <img src="../assets/images/qrcode.png" alt="QR Code">
        </div>

        <div class="divider">ou acesse manualmente</div>

        <a href="https://iemaneul.github.io/mobilidade-sp/" class="link" target="_blank">
            https://iemaneul.github.io/mobilidade-sp/
        </a>

        <div class="footer">
            Emanuel Costa
        </div>
    </div>
</body>
</html>
