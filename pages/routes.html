<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Metrô SP</title>
    <link rel="stylesheet" href="../css/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0053A0">
</head>

<body>

    <section id="header">
        <div class="navbar">
            <div class="title">
                <a href="../index.html" class="back-link" aria-label="Voltar"><span class="back-icon">&lt;</span></a>
                <h1>Definir rota</h1>
            </div>
        </div>
    </section>

<section id="tela-busca">

    <div class="busca">

        <div class="search">
            <div class="form">
                <div>
                    <label>Origem</label>
                    <div class="campo-estacao">
                        <input id="origem" type="text" placeholder="Digite o nome da estação" autocomplete="off" role="combobox" aria-autocomplete="list" aria-expanded="false" aria-controls="origem-sugestoes">
                        <div id="origem-sugestoes" class="lista-sugestoes hidden" role="listbox"></div>
                    </div>
                </div>

                <button id="invert" class="invert-btn"><img src="../assets/icons/top-bottom.png" alt=""></button>

                <div>
                    <label>Destino</label>
                    <div class="campo-estacao">
                        <input id="destino" type="text" placeholder="Digite o nome da estação" autocomplete="off" role="combobox" aria-autocomplete="list" aria-expanded="false" aria-controls="destino-sugestoes">
                        <div id="destino-sugestoes" class="lista-sugestoes hidden" role="listbox"></div>
                    </div>
                </div>
            </div>

        </div>

        <button id="buscar">Encontrar rota</button>

    </div>

</section>

<script type="module" src="../js/app.js"></script>

</body>
</html>
