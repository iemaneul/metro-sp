<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Metrô SP</title>
<link rel="stylesheet" href="../css/style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

    <section id="header">
        <div class="navbar">
            <div class="title">
                <a href="../index.html"><span>🡄</span></a>
                <h1>Definir rota</h1>
            </div>
        </div>
    </section>

<!-- TELA BUSCA -->

<section id="tela-busca">

    <div class="busca">

        <div class="search">
            <div class="form">
                <div>
                    <label>Origem</label>
                    <select id="origem"></select>
                </div>

                <div>
                    <label>Destino</label>
                    <select id="destino"></select>
                </div>
            </div>

            <button id="invert" class="invert-btn"><img src="../assets/icons/top-bottom.png" alt=""></button>

        </div>

        <button id="buscar">Encontrar rota</button>

    </div>

</section>

<!-- TELA RESULTADO -->

<section id="tela-resultado" class="hidden">

<div class="topo-rota">

<p><strong>Origem:</strong> <span id="origem-nome"></span></p>
<p><strong>Destino:</strong> <span id="destino-nome"></span></p>

<button id="voltar">← Nova rota</button>

</div>

<div id="resultado"></div>

</section>

<script type="module" src="../js/app.js"></script>

</body>
</html>
